<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="630" x2="1200" y2="0"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>
  <!-- House icon -->
  <g transform="translate(440, 120)">
    <path d="M160 0 L20 110 L50 110 L50 250 L270 250 L270 110 L300 110 Z" stroke="url(#accent)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Chimney -->
    <rect x="230" y="30" width="24" height="50" rx="3" stroke="url(#accent)" stroke-width="4" fill="none"/>
    <!-- Window -->
    <rect x="130" y="70" width="60" height="50" rx="4" stroke="url(#accent)" stroke-width="4" fill="none"/>
    <line x1="160" y1="70" x2="160" y2="120" stroke="url(#accent)" stroke-width="3"/>
    <line x1="130" y1="95" x2="190" y2="95" stroke="url(#accent)" stroke-width="3"/>
    <!-- Play button -->
    <polygon points="120,150 120,230 185,190" fill="url(#play)" opacity="0.9"/>
  </g>
  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" fill="white" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#ffffff">Esika</tspan><tspan fill="#ef4444">Tok</tspan>
  </text>
  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" fill="#94a3b8" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" letter-spacing="1">
    L'immobilier en vidéo courte
  </text>
  <!-- Bottom tagline -->
  <text x="600" y="545" text-anchor="middle" fill="#64748b" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="300">
    Maisons · Appartements · Terrains · Locaux commerciaux — RDC
  </text>
  <!-- Accent line bottom -->
  <rect x="450" y="570" width="300" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
