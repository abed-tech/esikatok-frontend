<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="EsikaTok - Découvrez l'immobilier en vidéo courte">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="api-base-url" content="">
    <title>EsikaTok - Immobilier en vidéo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primaire: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
                        sombre: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617' },
                        accent: { 400:'#f59e0b',500:'#f59e0b',600:'#d97706' },
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #f1f5f9; overflow: hidden; }
        /* Scroll snap pour le fil vidéo */
        .fil-video { scroll-snap-type: y mandatory; overflow-y: scroll; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .fil-video::-webkit-scrollbar { display: none; }
        .carte-video { scroll-snap-align: start; }
        /* Animations */
        .fondu-entree { animation: fonduEntree 0.3s ease-out; }
        @keyframes fonduEntree { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .glissement-haut { animation: glissementHaut 0.3s ease-out; }
        @keyframes glissementHaut { from { transform:translateY(100%); } to { transform:translateY(0); } }
        /* Toast */
        .toast { animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards; }
        @keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { to { opacity:0; transform:translateY(-20px); } }
        /* Loader */
        .loader { border:3px solid rgba(255,255,255,0.1); border-top:3px solid #3b82f6; border-radius:50%; width:32px; height:32px; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        /* Barre de progression vidéo */
        .barre-progression { transition: width 0.2s linear; }
        /* Masquer les contrôles vidéo natifs dans le feed */
        .carte-video video::-webkit-media-controls { display: none !important; }
        .carte-video video { -webkit-tap-highlight-color: transparent; }
        /* Zone tap ne doit pas interférer avec les boutons */
        .zone-tap-video { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        /* Modal overlay */
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        /* Safe area pour iPhone */
        .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 16px); }

        /* === Premium Badge Notifications (iOS / TikTok) === */
        .badge-notif {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px; height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            background: linear-gradient(135deg, #FF3B30 0%, #FF453A 40%, #C1271A 100%);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            line-height: 1;
            letter-spacing: -0.2px;
            white-space: nowrap;
            pointer-events: none;
            position: relative;
            overflow: hidden;
            transform: scale(1);
            z-index: 10;
            box-shadow:
                0 0 0 2px var(--badge-ring, #0f172a),
                0 2px 6px rgba(255,59,48,0.45),
                0 4px 14px rgba(193,39,26,0.2);
        }
        /* Glossy highlight */
        .badge-notif::after {
            content: '';
            position: absolute;
            top: 1px; left: 18%; right: 18%; height: 40%;
            border-radius: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }
        /* Size variants */
        .badge-notif--sm { min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; font-size: 9px; }
        .badge-notif--lg { min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px; font-size: 12px; }
        /* Dot-only (no text, e.g. unread indicator) */
        .badge-notif--dot { min-width: 10px; height: 10px; width: 10px; padding: 0; border-radius: 50%; font-size: 0; }
        /* Orange variant (warnings, expiring) */
        .badge-notif--orange {
            background: linear-gradient(135deg, #FF9F0A 0%, #FF6B00 100%);
            box-shadow: 0 0 0 2px var(--badge-ring, #0f172a), 0 2px 6px rgba(255,159,10,0.45), 0 4px 14px rgba(255,107,0,0.2);
        }
        /* Absolute positioning (nav icons) */
        .badge-notif--abs { position: absolute; top: -3px; right: -1px; }
        /* Animations */
        @keyframes badgeEntree {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.2); opacity: 1; }
            80%  { transform: scale(0.93); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes badgePulse {
            0%   { transform: scale(1); }
            35%  { transform: scale(1.22); }
            65%  { transform: scale(0.92); }
            100% { transform: scale(1); }
        }
        @keyframes badgeSortie {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        .badge-notif--entree { animation: badgeEntree 250ms cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        .badge-notif--pulse  { animation: badgePulse 300ms cubic-bezier(0.175,0.885,0.32,1.275); }
        .badge-notif--sortie { animation: badgeSortie 180ms ease-in forwards; }
        /* Logo animation */
        .logo-apparition { animation: logoApparition 0.8s cubic-bezier(0.25,0.46,0.45,0.94) both; }
        @keyframes logoApparition { from { opacity:0; transform:scale(0.85) translateY(-10px); } to { opacity:1; transform:scale(1) translateY(0); } }
        /* === Splash Screen === */
        #splash-screen { transition: opacity 0.4s ease-out, visibility 0.4s; }
        #splash-screen.splash-masquer { opacity:0; visibility:hidden; }
        @keyframes splashTrace { to { stroke-dashoffset: 0; } }
        @keyframes splashPlay { from { opacity:0; transform:scale(0.5); } to { opacity:0.9; transform:scale(1); } }
        @keyframes splashTexte { from { opacity:0; letter-spacing:8px; } to { opacity:1; letter-spacing:-0.5px; } }
        @keyframes splashPulse { 0%,100% { filter:drop-shadow(0 0 6px rgba(59,130,246,0.3)); } 50% { filter:drop-shadow(0 0 20px rgba(59,130,246,0.6)); } }
        .splash-logo-wrap { animation: splashPulse 1.5s ease-in-out 1.8s 1; }
    </style>
</head>
<body class="bg-sombre-900 text-sombre-50">
    <!-- === Splash Screen animé === -->
    <div id="splash-screen" class="fixed inset-0 z-[200] flex items-center justify-center" style="background:radial-gradient(ellipse at center, #0f172a 0%, #020617 100%);">
        <div class="flex flex-col items-center splash-logo-wrap">
            <svg class="w-32 h-32 sm:w-40 sm:h-40 mb-4" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="sp-g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="50%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
                    <linearGradient id="sp-t" x1="0" y1="0" x2="1" y2=".5"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient>
                    <linearGradient id="sp-p" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="60%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient>
                    <filter id="sp-gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                <!-- Maison (trace progressive) -->
                <path d="M100 28 L38 78 L48 78 L48 160 L152 160 L152 78 L162 78 Z" stroke="url(#sp-g)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#sp-gl)" stroke-dasharray="600" stroke-dashoffset="600" style="animation:splashTrace 1.2s ease-out 0.15s forwards;"/>
                <!-- Cheminée -->
                <rect x="130" y="44" width="16" height="30" rx="2" stroke="url(#sp-t)" stroke-width="4" fill="none" stroke-dasharray="100" stroke-dashoffset="100" style="animation:splashTrace 0.6s ease-out 0.8s forwards;"/>
                <!-- Fenêtre -->
                <rect x="90" y="62" width="20" height="18" rx="2" stroke="url(#sp-t)" stroke-width="3" fill="none" stroke-dasharray="80" stroke-dashoffset="80" style="animation:splashTrace 0.5s ease-out 0.9s forwards;"/>
                <line x1="100" y1="62" x2="100" y2="80" stroke="url(#sp-t)" stroke-width="2" stroke-dasharray="20" stroke-dashoffset="20" style="animation:splashTrace 0.3s ease-out 1.1s forwards;"/>
                <line x1="90" y1="71" x2="110" y2="71" stroke="url(#sp-t)" stroke-width="2" stroke-dasharray="20" stroke-dashoffset="20" style="animation:splashTrace 0.3s ease-out 1.15s forwards;"/>
                <!-- Bouton Play -->
                <polygon points="82,102 82,150 125,126" fill="url(#sp-p)" opacity="0" style="animation:splashPlay 0.5s ease-out 1.3s forwards; transform-origin:95px 126px;"/>
            </svg>
            <!-- Texte EsikaTok -->
            <div style="animation:splashTexte 0.6s ease-out 1.6s both;">
                <span class="text-2xl sm:text-3xl font-bold tracking-tight"><span class="text-white">Esika</span><span class="text-red-500">Tok</span></span>
            </div>
            <p class="text-sombre-400 text-xs mt-2" style="animation:splashTexte 0.5s ease-out 1.9s both;">L'immobilier en vidéo</p>
        </div>
    </div>
    <script>
        (function(){
            var s=document.getElementById('splash-screen');
            if(!s)return;
            var t=setTimeout(function(){s.classList.add('splash-masquer');},2600);
            s.addEventListener('transitionend',function(){s.remove();});
            s.addEventListener('click',function(){clearTimeout(t);s.classList.add('splash-masquer');});
        })();
    </script>

    <!-- Conteneur principal de l'application -->
    <div id="app" class="h-screen w-screen flex flex-col relative overflow-hidden">
        <!-- Zone de contenu principal (changée par le routeur) -->
        <div id="contenu-principal" class="flex-1 overflow-hidden"></div>

        <!-- Navigation basse fixe (mobile-first) -->
        <nav id="nav-basse" class="fixed bottom-0 left-0 right-0 z-50 bg-sombre-900/95 backdrop-blur-md border-t border-sombre-700/50 safe-bottom hidden">
            <div class="flex justify-around items-center h-14 max-w-lg mx-auto px-2">
                <button onclick="EsikaTok.naviguer('accueil')" data-nav="accueil" class="nav-btn flex flex-col items-center justify-center w-14 h-14 text-sombre-200 hover:text-primaire-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
                    <span class="text-[10px] mt-0.5">Accueil</span>
                </button>
                <button onclick="EsikaTok.naviguer('recherche')" data-nav="recherche" class="nav-btn flex flex-col items-center justify-center w-14 h-14 text-sombre-200 hover:text-primaire-400 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <span class="text-[10px] mt-0.5">Recherche</span>
                </button>
                <button onclick="EsikaTok.naviguer('publier')" data-nav="publier" class="nav-btn flex flex-col items-center justify-center w-14 h-14">
                    <div class="w-10 h-7 bg-gradient-to-r from-primaire-500 to-accent-500 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                    </div>
                    <span class="text-[10px] mt-0.5 text-sombre-200">Publier</span>
                </button>
                <button onclick="EsikaTok.naviguer('messages')" data-nav="messages" class="nav-btn flex flex-col items-center justify-center w-14 h-14 text-sombre-200 hover:text-primaire-400 transition-colors relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    <span id="badge-messages" class="hidden badge-notif badge-notif--abs" style="--badge-ring:#0f172af2">0</span>
                    <span class="text-[10px] mt-0.5">Messages</span>
                </button>
                <button onclick="EsikaTok.naviguer('profil')" data-nav="profil" class="nav-btn flex flex-col items-center justify-center w-14 h-14 text-sombre-200 hover:text-primaire-400 transition-colors relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <span id="badge-profil" class="hidden badge-notif badge-notif--abs" style="--badge-ring:#0f172af2">0</span>
                    <span class="text-[10px] mt-0.5">Profil</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Zone de toasts/notifications -->
    <div id="zone-toasts" class="fixed top-4 left-4 right-4 z-[100] flex flex-col items-center gap-2 pointer-events-none"></div>

    <!-- Chargement des modules JS -->
    <!-- Noyau -->
    <script src="js/api.js"></script>
    <script src="js/etat.js"></script>
    <script src="js/composants.js"></script>
    <!-- Pages utilisateur -->
    <script src="js/page-feed.js"></script>
    <script src="js/page-recherche.js"></script>
    <script src="js/page-feed-recherche.js"></script>
    <script src="js/page-detail.js"></script>
    <script src="js/page-connexion.js"></script>
    <script src="js/page-inbox.js"></script>
    <script src="js/page-message.js"></script>
    <script src="js/page-favoris.js"></script>
    <script src="js/page-publier.js"></script>
    <script src="js/page-profil.js"></script>
    <script src="js/page-aide.js"></script>
    <!-- Pages agent -->
    <script src="js/page-agent.js"></script>
    <script src="js/page-carte.js"></script>
    <!-- Badge notifications -->
    <script src="js/badge-manager.js"></script>
    <!-- Routeur principal (chargé en dernier) -->
    <script src="js/app.js"></script>
</body>
</html>
